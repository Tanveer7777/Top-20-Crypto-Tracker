<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoTrack — Portfolio Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --accent: #00ff88;
    --accent2: #00d4ff;
    --red: #ff4d6d;
    --green: #00ff88;
    --text: #e6edf3;
    --muted: #7d8590;
    --card-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    padding: 6px 12px;
    border-radius: 20px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: rgba(0,255,136,0.3); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0.6;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  /* MAIN CONTENT GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* TABLE SECTION */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .icon { font-size: 16px; }

  /* ADD COIN FORM */
  .add-form {
    display: flex;
    gap: 10px;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-wrap: wrap;
  }

  .add-form select,
  .add-form input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 9px 13px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form select:focus,
  .add-form input:focus { border-color: var(--accent); }

  .add-form select { min-width: 160px; }
  .add-form input { width: 120px; }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.85; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 22px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }

  thead th:last-child { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 14px 22px;
    font-size: 13px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .coin-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-logo {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    object-fit: cover;
    flex-shrink: 0;
  }

  .coin-name { font-weight: 700; font-size: 14px; }
  .coin-sym {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .mono { font-family: 'Space Mono', monospace; font-size: 12px; }

  .profit { color: var(--green); }
  .loss { color: var(--red); }

  .pnl-cell { text-align: right; }

  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-left: auto;
  }

  .remove-btn:hover { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }

  /* CHART PANEL */
  .chart-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    flex: 1;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .chart-container { position: relative; height: 220px; }

  /* MARKET TABLE */
  .market-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .market-list { max-height: 420px; overflow-y: auto; }

  .market-list::-webkit-scrollbar { width: 4px; }
  .market-list::-webkit-scrollbar-track { background: transparent; }
  .market-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .market-row {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.15s;
    cursor: pointer;
  }

  .market-row:last-child { border-bottom: none; }
  .market-row:hover { background: rgba(255,255,255,0.02); }

  .market-rank {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
  }

  .market-logo {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    flex-shrink: 0;
    object-fit: cover;
  }

  .market-info { flex: 1; min-width: 0; }
  .market-name { font-size: 13px; font-weight: 600; }
  .market-sym { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .market-price {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-align: right;
  }

  .market-change {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: right;
    width: 52px;
    flex-shrink: 0;
  }

  /* LOADING OVERLAY */
  .loading-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
    z-index: 1000;
  }

  .loading-bar.active { width: 70%; }
  .loading-bar.done { width: 100%; opacity: 0; transition: width 0.2s, opacity 0.4s 0.2s; }

  /* Skeleton shimmer */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .shimmer {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }

  /* Countdown */
  .countdown {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 12px 18px;
    border-radius: 10px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    font-family: 'Space Mono', monospace;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .chart-panel { flex-direction: row; flex-wrap: wrap; }
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr; }
    .add-form { flex-direction: column; }
    .add-form input { width: 100%; }
    .stat-value { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">₿</div>
      <div class="logo-text">Crypto<span>Track</span></div>
    </div>
    <div class="header-right">
      <div class="countdown" id="countdown">Refresh in 30s</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- SUMMARY CARDS -->
  <div class="summary-grid">
    <div class="stat-card">
      <div class="stat-label">Total Invested</div>
      <div class="stat-value" id="totalInvested">$0.00</div>
      <div class="stat-sub">Cost basis</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Portfolio Value</div>
      <div class="stat-value" id="totalValue">$0.00</div>
      <div class="stat-sub" id="valueChange">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total P&L</div>
      <div class="stat-value" id="totalPnl">$0.00</div>
      <div class="stat-sub" id="pnlPct">0.00%</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: Portfolio Table -->
    <div>
      <div class="section-card">
        <div class="section-header">
          <div class="section-title"><span class="icon">📊</span> My Portfolio</div>
          <button onclick="clearPortfolio()" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;">Clear All</button>
        </div>
        <!-- ADD FORM -->
        <div class="add-form">
          <select id="coinSelect">
            <option value="">Select coin…</option>
          </select>
          <input type="number" id="quantityInput" placeholder="Quantity" min="0" step="any">
          <input type="number" id="buyPriceInput" placeholder="Buy Price ($)" min="0" step="any">
          <button class="add-btn" onclick="addToPortfolio()">+ Add Coin</button>
        </div>
        <!-- TABLE -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Coin</th>
                <th>Qty</th>
                <th>Buy Price</th>
                <th>Current</th>
                <th>Value</th>
                <th style="text-align:right">P&L</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="portfolioBody">
              <tr><td colspan="7"><div class="empty-state"><div class="emoji">🚀</div>Add coins to track your portfolio</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- RIGHT: Chart + Market -->
    <div class="chart-panel">
      <!-- Allocation Chart -->
      <div class="chart-card">
        <div class="chart-title">Allocation</div>
        <div class="chart-container">
          <canvas id="allocationChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- MARKET TABLE (full width) -->
  <div class="market-card">
    <div class="section-header">
      <div class="section-title"><span class="icon">🌐</span> Top 20 Crypto Markets</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">Click coin to add to portfolio</div>
    </div>
    <div class="market-list" id="marketList">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =====================
//   STATE
// =====================
const COINS = [
  { id: 'bitcoin',       sym: 'BTC', name: 'Bitcoin' },
  { id: 'ethereum',      sym: 'ETH', name: 'Ethereum' },
  { id: 'tether',        sym: 'USDT', name: 'Tether' },
  { id: 'binancecoin',   sym: 'BNB', name: 'BNB' },
  { id: 'solana',        sym: 'SOL', name: 'Solana' },
  { id: 'ripple',        sym: 'XRP', name: 'XRP' },
  { id: 'cardano',       sym: 'ADA', name: 'Cardano' },
  { id: 'dogecoin',      sym: 'DOGE', name: 'Dogecoin' },
  { id: 'tron',          sym: 'TRX', name: 'TRON' },
  { id: 'polkadot',      sym: 'DOT', name: 'Polkadot' },
  { id: 'polygon',       sym: 'MATIC', name: 'Polygon' },
  { id: 'litecoin',      sym: 'LTC', name: 'Litecoin' },
  { id: 'avalanche-2',   sym: 'AVAX', name: 'Avalanche' },
  { id: 'chainlink',     sym: 'LINK', name: 'Chainlink' },
  { id: 'uniswap',       sym: 'UNI', name: 'Uniswap' },
  { id: 'stellar',       sym: 'XLM', name: 'Stellar' },
  { id: 'cosmos',        sym: 'ATOM', name: 'Cosmos' },
  { id: 'filecoin',      sym: 'FIL', name: 'Filecoin' },
  { id: 'aptos',         sym: 'APT', name: 'Aptos' },
  { id: 'near',          sym: 'NEAR', name: 'NEAR Protocol' },
];

let prices = {};       // { id: { usd, usd_24h_change } }
let marketData = [];   // full market data with logos
let portfolio = [];    // [{ id, sym, name, qty, buyPrice }]
let allocationChart = null;
let countdownVal = 30;
let countdownTimer = null;

const PALETTE = [
  '#00ff88','#00d4ff','#7c3aed','#f59e0b','#ef4444',
  '#06b6d4','#8b5cf6','#10b981','#f97316','#ec4899',
  '#84cc16','#3b82f6','#a78bfa','#34d399','#fb923c',
  '#e11d48','#0ea5e9','#d946ef','#22d3ee','#fbbf24'
];

// =====================
//   INIT
// =====================
window.addEventListener('DOMContentLoaded', () => {
  loadPortfolio();
  populateCoinSelect();
  fetchData();
  startCountdown();
});

function populateCoinSelect() {
  const sel = document.getElementById('coinSelect');
  COINS.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = `${c.name} (${c.sym})`;
    sel.appendChild(o);
  });
}

// =====================
//   FETCH
// =====================
async function fetchData() {
  setLoading(true);
  const ids = COINS.map(c => c.id).join(',');
  try {
    // Prices + 24h change
    const [priceRes, marketRes] = await Promise.all([
      fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`),
      fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=20&page=1`)
    ]);

    if (priceRes.ok) prices = await priceRes.json();
    if (marketRes.ok) marketData = await marketRes.json();

    renderMarket();
    renderPortfolio();
    renderChart();
    showToast('Prices updated', 'success');
  } catch (e) {
    showToast('Failed to fetch — using cached data', 'error');
    renderPortfolio();
  }
  setLoading(false);
}

async function manualRefresh() {
  document.getElementById('refreshBtn').classList.add('spinning');
  countdownVal = 30;
  await fetchData();
  document.getElementById('refreshBtn').classList.remove('spinning');
}

function startCountdown() {
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('countdown').textContent = `Refresh in ${countdownVal}s`;
    if (countdownVal <= 0) {
      countdownVal = 30;
      fetchData();
    }
  }, 1000);
}

// =====================
//   MARKET LIST
// =====================
function renderMarket() {
  const list = document.getElementById('marketList');
  if (!marketData.length) return;

  list.innerHTML = marketData.map((coin, i) => {
    const change = coin.price_change_percentage_24h || 0;
    const changeClass = change >= 0 ? 'profit' : 'loss';
    const changeSign = change >= 0 ? '+' : '';
    return `
      <div class="market-row" onclick="quickAdd('${coin.id}')">
        <div class="market-rank">${i + 1}</div>
        <img class="market-logo" src="${coin.image}" alt="${coin.name}" onerror="this.style.display='none'">
        <div class="market-info">
          <div class="market-name">${coin.name}</div>
          <div class="market-sym">${coin.symbol.toUpperCase()}</div>
        </div>
        <div class="market-price mono">${fmt(coin.current_price)}</div>
        <div class="market-change ${changeClass}">${changeSign}${change.toFixed(2)}%</div>
      </div>
    `;
  }).join('');
}

function quickAdd(coinId) {
  document.getElementById('coinSelect').value = coinId;
  document.getElementById('quantityInput').focus();
  showToast('Coin selected — enter quantity & buy price', 'success');
}

// =====================
//   PORTFOLIO CRUD
// =====================
function addToPortfolio() {
  const id = document.getElementById('coinSelect').value;
  const qty = parseFloat(document.getElementById('quantityInput').value);
  const buyPrice = parseFloat(document.getElementById('buyPriceInput').value);

  if (!id) return showToast('Please select a coin', 'error');
  if (!qty || qty <= 0) return showToast('Enter a valid quantity', 'error');
  if (!buyPrice || buyPrice <= 0) return showToast('Enter a valid buy price', 'error');

  const coin = COINS.find(c => c.id === id);
  const existing = portfolio.findIndex(p => p.id === id);

  if (existing >= 0) {
    // Average up
    const old = portfolio[existing];
    const totalQty = old.qty + qty;
    const avgBuy = ((old.qty * old.buyPrice) + (qty * buyPrice)) / totalQty;
    portfolio[existing] = { ...old, qty: totalQty, buyPrice: avgBuy };
    showToast(`${coin.sym} position updated`, 'success');
  } else {
    portfolio.push({ id, sym: coin.sym, name: coin.name, qty, buyPrice });
    showToast(`${coin.sym} added to portfolio`, 'success');
  }

  document.getElementById('quantityInput').value = '';
  document.getElementById('buyPriceInput').value = '';
  document.getElementById('coinSelect').value = '';

  savePortfolio();
  renderPortfolio();
  renderChart();
}

function removeFromPortfolio(id) {
  portfolio = portfolio.filter(p => p.id !== id);
  savePortfolio();
  renderPortfolio();
  renderChart();
}

function clearPortfolio() {
  if (portfolio.length === 0) return;
  portfolio = [];
  savePortfolio();
  renderPortfolio();
  renderChart();
  showToast('Portfolio cleared', 'error');
}

function savePortfolio() {
  localStorage.setItem('cryptotrack_portfolio', JSON.stringify(portfolio));
}

function loadPortfolio() {
  try {
    const saved = localStorage.getItem('cryptotrack_portfolio');
    if (saved) portfolio = JSON.parse(saved);
  } catch(e) { portfolio = []; }
}

// =====================
//   RENDER PORTFOLIO
// =====================
function renderPortfolio() {
  const tbody = document.getElementById('portfolioBody');
  let totalInvested = 0, totalValue = 0;

  if (portfolio.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="emoji">🚀</div>Add coins to track your portfolio</div></td></tr>`;
    updateSummary(0, 0);
    return;
  }

  const logoMap = {};
  marketData.forEach(m => logoMap[m.id] = m.image);

  tbody.innerHTML = portfolio.map(p => {
    const priceData = prices[p.id];
    const cur = priceData ? priceData.usd : 0;
    const val = cur * p.qty;
    const invested = p.buyPrice * p.qty;
    const pnl = val - invested;
    const pnlPct = invested > 0 ? (pnl / invested) * 100 : 0;
    totalInvested += invested;
    totalValue += val;

    const pnlClass = pnl >= 0 ? 'profit' : 'loss';
    const pnlSign = pnl >= 0 ? '+' : '';
    const logoUrl = logoMap[p.id] || '';

    return `
      <tr>
        <td>
          <div class="coin-cell">
            ${logoUrl ? `<img class="coin-logo" src="${logoUrl}" alt="${p.name}">` : ''}
            <div>
              <div class="coin-name">${p.name}</div>
              <div class="coin-sym">${p.sym}</div>
            </div>
          </div>
        </td>
        <td class="mono">${p.qty % 1 === 0 ? p.qty : p.qty.toFixed(6)}</td>
        <td class="mono">${fmt(p.buyPrice)}</td>
        <td class="mono">${cur ? fmt(cur) : '—'}</td>
        <td class="mono">${cur ? fmt(val) : '—'}</td>
        <td class="pnl-cell">
          <div class="mono ${pnlClass}">${cur ? pnlSign + fmt(pnl) : '—'}</div>
          <div class="mono ${pnlClass}" style="font-size:10px">${cur ? pnlSign + pnlPct.toFixed(2) + '%' : ''}</div>
        </td>
        <td><button class="remove-btn" onclick="removeFromPortfolio('${p.id}')">×</button></td>
      </tr>
    `;
  }).join('');

  updateSummary(totalInvested, totalValue);
}

function updateSummary(invested, value) {
  const pnl = value - invested;
  const pnlPct = invested > 0 ? (pnl / invested) * 100 : 0;
  const pnlClass = pnl >= 0 ? 'positive' : 'negative';

  document.getElementById('totalInvested').textContent = fmt(invested);
  document.getElementById('totalValue').textContent = fmt(value);

  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl);
  pnlEl.className = 'stat-value ' + pnlClass;

  document.getElementById('pnlPct').textContent = (pnl >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%';
  document.getElementById('valueChange').textContent = `${portfolio.length} coin${portfolio.length !== 1 ? 's' : ''} tracked`;
}

// =====================
//   CHART
// =====================
function renderChart() {
  const ctx = document.getElementById('allocationChart').getContext('2d');

  if (portfolio.length === 0) {
    if (allocationChart) { allocationChart.destroy(); allocationChart = null; }
    return;
  }

  const logoMap = {};
  marketData.forEach(m => logoMap[m.id] = m.image);

  const labels = [], data = [], colors = [];
  let totalVal = 0;

  portfolio.forEach(p => {
    const cur = prices[p.id]?.usd || 0;
    const val = cur * p.qty;
    totalVal += val;
  });

  portfolio.forEach((p, i) => {
    const cur = prices[p.id]?.usd || 0;
    const val = cur * p.qty;
    if (val > 0) {
      labels.push(p.sym);
      data.push(+val.toFixed(2));
      colors.push(PALETTE[i % PALETTE.length]);
    }
  });

  if (allocationChart) allocationChart.destroy();

  allocationChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: '#080c10',
        borderWidth: 3,
        hoverBorderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#7d8590',
            font: { family: 'Space Mono', size: 10 },
            boxWidth: 10,
            padding: 10,
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const pct = totalVal > 0 ? ((ctx.raw / totalVal) * 100).toFixed(1) : 0;
              return ` ${fmt(ctx.raw)} (${pct}%)`;
            }
          },
          backgroundColor: '#161b22',
          borderColor: '#21262d',
          borderWidth: 1,
          titleColor: '#e6edf3',
          bodyColor: '#7d8590',
          titleFont: { family: 'Space Mono' },
          bodyFont: { family: 'Space Mono' },
        }
      }
    }
  });
}

// =====================
//   UTILS
// =====================
function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '$0.00';
  if (n < 0.01 && n > 0) return '$' + n.toFixed(6);
  if (n < 1) return '$' + n.toFixed(4);
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setLoading(on) {
  const bar = document.getElementById('loadingBar');
  if (on) {
    bar.classList.remove('done');
    bar.classList.add('active');
  } else {
    bar.classList.remove('active');
    bar.classList.add('done');
    setTimeout(() => bar.classList.remove('done'), 700);
  }
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
